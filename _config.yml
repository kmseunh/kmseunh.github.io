# Site settings
title: kmseunh's Devlog # site title
description: >- # site description
  I think there is no end to learning. 
  It is a blog that studies every day and summarizes what you learned from the day.
lang: en-US # default lang
timezone: Asia/Seoul # set your timezone
image: assets/img/thumbnail.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/piharpi/jekyll-klise # site repo [optional]
mode: dark # default theme "dark" | "light"
future: ture

# Profile settings
author:
  name: kmseunh's Devlog # author name
  bio: >- # tell to the world]
    To become a good developer, I think endless learning and challenges are necessary. 
  username: username # general username
  github: kmseunh # github username
  # twitter: twitter_username # twitter username
  facebook: facebook_username # facebook username
  email: tmdgus8777@gmail.com # email adress
  avatar: /assets/img/catdev.png # change with your own avatar

# URL settings
url: "https://kmseunh.github.io/" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
  - jemoji